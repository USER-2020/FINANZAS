<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#07131b">
    <title>Sin conexion - Finanzas OS</title>
    <style>
        :root {
            color-scheme: dark;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(circle at top left, rgba(14, 165, 233, 0.2), transparent 24rem),
                radial-gradient(circle at top right, rgba(16, 185, 129, 0.14), transparent 20rem),
                linear-gradient(180deg, #07131b, #0b1d29);
            color: #f8fafc;
            font-family: Figtree, system-ui, sans-serif;
        }

        .card {
            width: min(100%, 420px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            background: rgba(16, 33, 45, 0.88);
            padding: 28px;
            box-shadow: 0 24px 60px rgba(2, 8, 23, 0.4);
            text-align: center;
        }

        .badge {
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
            display: grid;
            place-items: center;
            border-radius: 20px;
            background: rgba(34, 211, 238, 0.12);
            border: 1px solid rgba(34, 211, 238, 0.24);
            color: #a5f3fc;
            font-size: 28px;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 28px;
        }

        p {
            margin: 0;
            line-height: 1.7;
            color: rgba(226, 232, 240, 0.8);
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="badge">↗</div>
        <h1>Estas sin conexion</h1>
        <p>Finanzas OS mantendra en cache la interfaz basica y los ultimos recursos disponibles cuando recuperes internet.</p>
    </main>
</body>
</html>
